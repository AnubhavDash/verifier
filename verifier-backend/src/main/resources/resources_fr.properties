# SETUP
setup.verification301.description=FR: \\\\ Verify the consistency of the encryption group in setup files.
setup.verification301.nok.message=FR:\\\\ Not all encryption groups are the same.
setup.verification302.description=FR:\\\\Verify that the payloads for all Node IDs are present.
setup.verification302.nok.message=FR:\\\\The node IDs of the payloads do not correspond exactly to the control component node IDs.
setup.verification303.description=FR:\\\\ Verify the context file names consistency.
setup.verification303.nok.message=FR:\\\\ The context file names are not consistent with their content (Node Id).
