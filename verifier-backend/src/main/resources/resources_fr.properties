setup.verification313.nok.message=FR:\\\\ The given PrimesMappingTables are not consistent.
setup.verification314.description=FR:\\\\ Verify that the total number of voters is consistent.
setup.verification314.nok.message=FR:\\\\ The total number of voters does not correspond to the total number of voting cards.
