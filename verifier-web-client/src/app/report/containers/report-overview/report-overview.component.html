<div>
  <div id="buttonDiv">
    <h2>Verification definitions</h2>
    <div>
      <b>Input directory :</b>
      <input type="text" name="inputDirectory" [(ngModel)]="inputDirectory" style="width:30%">
      <div>
        <button type="button" (click)="startProcess('PreDecryption')" [disabled]="buttonDisabled" class="btn">
          Start pre-decryption
        </button>
        <button (click)="startProcess()" [disabled]="buttonDisabled" class="btn">Start all</button>
        <button (click)="update()" class="btn">Update</button>
        <button (click)="resetProcess()" class="btn">Reset</button>
        |
        <button routerLink="/report/pdf" class="btn">PDF</button>
      </div>
    </div>
    <p></p>
  </div>
  <table class="table table-bordered table-hover">
    <tr class="table-secondary">
      <th>Block</th>
      <th>Id</th>
      <th>Name</th>
      <th>Category</th>
      <th>Description</th>
      <th>Status</th>
      <!--th>Message</th-->
    </tr>
    <tr *ngFor="let key of keys"
        [class.bg-success]="verifications[key].status === 'OK'"
        [class.bg-danger]="verifications[key].status === 'NOK'"
        [class.bg-secondary]="verifications[key].status === 'NA'">
      <td [class.text-light]="verifications[key].status !== null">{{verifications[key].blockId}}</td>
      <td [class.text-light]="verifications[key].status !== null">{{verifications[key].verificationId}}</td>
      <td [class.text-light]="verifications[key].status !== null">{{verifications[key].name}}</td>
      <td [class.text-light]="verifications[key].status !== null">{{verifications[key].category}}</td>
      <td [class.text-light]="verifications[key].status !== null">{{verifications[key].description}}</td>
      <td [class.text-light]="verifications[key].status !== null">
        <div title="{{verifications[key].message}}">{{verifications[key].status}}</div>
      </td>
      <!--td></td-->
    </tr>
  </table>
</div>
