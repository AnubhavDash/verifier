<div>
  <div id="buttonDiv">
    <h2>Verification definitions</h2>
    <div>
      <b>Input directory :</b>
      <input type="text" name="inputDirectory" [(ngModel)]="inputDirectory" style="width:30%">
      <div>
        <button type="button" (click)="startProcess(verificationTrait.BLOCK_1)" [disabled]="buttonDisabled" class="btn">
          Start block 1
        </button>
        <button type="button" (click)="startProcess(verificationTrait.PRE_DECRYPTION)" [disabled]="buttonDisabled" class="btn">Start
          pre-decryption
        </button>
        <button (click)="startProcess()" [disabled]="buttonDisabled" class="btn">Start all</button>
        <button (click)="update()" class="btn">Update</button>
        <button (click)="resetProcess()" class="btn">Reset</button>
        |
        <button routerLink="/report/pdf" class="btn">PDF</button>
      </div>
    </div>
    <p></p>
  </div>
  <table class="table table-bordered table-hover">
    <tr class="table-secondary">
      <th>Block</th>
      <th>Id</th>
      <th>Name</th>
      <th>Category</th>
      <th>Description</th>
      <th>Status</th>
      <!--th>Message</th-->
    </tr>
    <tr *ngFor="let verification of verifications | keyvalue"
        [class.bg-success]="isOK(verification.value.status)"
        [class.bg-danger]="isNotOK(verification.value.status)"
        [class.bg-warning]="isError(verification.value.status)"
        [class.bg-secondary]="isNA(verification.value.status)">
      <td [class.text-light]="verification.value.status !== null">{{verification.value.blockId}}</td>
      <td [class.text-light]="verification.value.status !== null">{{verification.value.verificationId}}</td>
      <td [class.text-light]="verification.value.status !== null">{{verification.value.name}}</td>
      <td [class.text-light]="verification.value.status !== null">{{verification.value.category}}</td>
      <td [class.text-light]="verification.value.status !== null">{{verification.value.description}}</td>
      <td [class.text-light]="verification.value.status !== null">
        <div title="{{verification.value.message}}">{{verification.value.status}}</div>
      </td>
      <!--td></td-->
    </tr>
  </table>
</div>
