<div>
  <div id="buttonDiv">
    <h2>Test definitions</h2>
    <div>
    <b>Input directory :</b>
    <input type="text" name="inputDirectory" [(ngModel)]="inputDirectory" style="width:30%">
    <div>
      <br/>
      <button (click)="startProcess('PreDecryption')" [disabled]="buttonDisabled" class="btn">Start pre-decryption</button>
      <button (click)="startProcess()" [disabled]="buttonDisabled" class="btn">Start all</button>
      <button (click)="update()" class="btn">Update</button>
    <button (click)="resetProcess()" class="btn">Reset</button>
      |
      <button routerLink="/report/pdf" class="btn">PDF</button>
    </div>
  </div>
    <p></p>
  </div>
  <table border="1" class="table table-bordered table-hover">
    <tr>
      <th>Block</th>
      <th>Id</th>
      <th>Name</th>
      <th>Category</th>
      <th>Description</th>
      <th>Status</th>
      <!--th>Message</th-->
    </tr>
    <tr *ngFor="let key of keys" [ngStyle]="{'background-color':tests[key].color}">
      <td>{{tests[key].blockId}}</td>
      <td>{{tests[key].testId}}</td>
      <td>{{tests[key].name}}</td>
      <td>{{tests[key].category}}</td>
      <td>{{tests[key].description}}</td>
      <td><div title="{{tests[key].message}}">{{tests[key].status}}</div></td>
      <!--td></td-->
    </tr>
  </table>
</div>
