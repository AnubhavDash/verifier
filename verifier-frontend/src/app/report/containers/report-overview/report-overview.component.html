<div>
  <div id="buttonDiv">
    <h2>Test definitions</h2>
    <button (click)="startProcess()" [disabled]="buttonDisabled" class="btn">Start Process</button>
    <button (click)="resetProcess()" class="btn">Reset Process</button>
    <p></p>
  </div>
  <table border="1" class="table table-bordered table-hover">
    <tr>
      <th>Block</th>
      <th>Id</th>
      <th>Name</th>
      <th>Category</th>
      <th>Description</th>
      <th>Status</th>
      <!--th>Message</th-->
    </tr>
    <tr *ngFor="let key of keys" [ngStyle]="{'background-color':tests[key].color}">
      <td>{{tests[key].blockId}}</td>
      <td>{{tests[key].testId}}</td>
      <td>{{tests[key].name}}</td>
      <td>{{tests[key].category}}</td>
      <td>{{tests[key].description}}</td>
      <td><div title="{{tests[key].message}}">{{tests[key].status}}</div></td>
      <!--td></td-->
    </tr>
  </table>
</div>
