<div>
  <h2>Test definitions</h2>
  <button (click)="startProcess()" [disabled]="buttonDisabled">Start Process</button>
  <table border="1">
    <tr>
      <th>Block</th>
      <th>Id</th>
      <th>Name</th>
      <th>Category</th>
      <th>Description</th>
      <th>Status</th>
      <th>Message</th>
    </tr>
    <tr *ngFor="let key of keys" [ngStyle]="{'background-color':tests[key].color}">
      <td>{{tests[key].blockId}}</td>
      <td>{{tests[key].testId}}</td>
      <td>{{tests[key].name}}</td>
      <td>{{tests[key].category}}</td>
      <td>{{tests[key].description}}</td>
      <td>{{tests[key].status}}</td>
      <td>{{tests[key].message}}</td>
    </tr>
  </table>
</div>
