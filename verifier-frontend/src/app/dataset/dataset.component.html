<ver-page-title
  [instructions]="'dataset.instructions' | translate"
  [title]="'dataset.title' | translate"
>
  @if (isEnabledNextButton) {
    <div class="alert alert-success page-actions">
      <i aria-hidden="true" class="bi bi-upload"></i>
      <p>
        {{ 'dataset.instructions' | translate }}
      </p>
      <button (click)="next()" class="btn btn-primary" type="button">
        <i aria-hidden="true" class="bi bi-arrow-right-circle"></i>
        {{ 'common.next' | translate }}
      </button>
    </div>
  } @else {
    <div class="alert alert-info page-actions">
      <i aria-hidden="true" class="bi bi-upload"></i>
      <p>
        {{ 'dataset.instructions' | translate }}
      </p>
      <button [disabled]="true" class="btn btn-primary" type="button">
        <i aria-hidden="true" class="bi bi-arrow-right-circle"></i>
        {{ 'common.next' | translate }}
      </button>
    </div>
  }
</ver-page-title>

<div class="card">
  <div class="card-header">
    {{ 'dataset.datasetUpload.title' | translate }}
  </div>
  <div class="card-body">
    <ver-verifier-mode
      (newVerifierMode)="setVerifierMode($event)"
      [changeModeDisabled]="actionsDisabled()"
      [verifierMode]="verifierMode"
    ></ver-verifier-mode>

    @if (isShownUploadContext) {
      <hr>
      <ver-dataset-upload
        (datasetConfiguration)="setDatasetConfigurationContext($event)"
        (uploadingDataset)="uploadingDatasetContextReset($event)"
        [datasetType]="getDatasetTypeContext()"
        [uploadDisabled]="actionsDisabled()"
        [verifierMode]="verifierMode"
        [configuration]="configuration"/>
    }
    @if (isShownUploadTally) {
      <ver-dataset-upload
        (datasetConfiguration)="setDatasetConfigurationTally($event)"
        (uploadingDataset)="uploadingDatasetTallyReset($event)"
        [datasetType]="DatasetType.TALLY"
        [uploadDisabled]="actionsDisabled()"
        [configuration]="configuration"/>
    }
  </div>
</div>

@if (isShownDatasetInformation) {
  <ver-dataset-information
    [configuration]="configuration"
    [displayDatasetInformation]="true"
    [verifierMode]="verifierMode"/>
}
