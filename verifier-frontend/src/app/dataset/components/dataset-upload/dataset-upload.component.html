<input #uploadDataset (change)="upload($event)" accept=".zip" onclick="this.value=null" style="display: none" type="file">
<div class="row mb-2">
  <div class="d-grid col-4">
    <button (click)="uploadDataset.click()"
            [disabled]="isUploadDisabled()"
            [ngClass]="{'btn-primary': isNotUploaded(), 'btn-outline-primary': !isNotUploaded()}"
            class="btn btn-block upload-button text-center dataset-type">
      <i aria-hidden="true" class="bi-upload"></i> {{ 'dataset.datasetUpload.uploadButton' | translate: {datasetType} }}
    </button>
  </div>
  <div class="col-8 mt-2">
    @if (isNotUploaded()) {
      {{ 'dataset.datasetUpload.notUploadedYet' | translate }}
    }
    @if (isUploading()) {
      <div class="spinner-border spinner-border-sm text-primary">
        <span class="visually-hidden">In progress...</span>
      </div>
      {{ 'dataset.datasetUpload.uploading' | translate }}
    }
    @if (errorOccurred()) {
      <i aria-hidden="true" class="bi-exclamation-circle text-danger"></i>
      {{ 'dataset.datasetUpload.error' | translate }}
    }
    @if (isUploaded()) {
      <i aria-hidden="true" class="bi-check-circle text-success"></i> {{filename}}
    }
  </div>
</div>
