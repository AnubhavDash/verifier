<div class="form-check">
  <input (click)="$event.preventDefault(); changeModeToSetup(changeModeModal)" name="radioMode" value="{{VerifierMode.SETUP}}" class="form-check-input" type="radio"
         id="setupModeRadio" [checked]="isSetupMode()">
  <label class="form-check-label" for="setupModeRadio">
    {{ 'dataset.verifierMode.setup' | translate }}
  </label>
</div>
<div class="form-check">
  <input (click)="$event.preventDefault(); changeModeToTally(changeModeModal)" name="radioMode" value="{{VerifierMode.TALLY}}" class="form-check-input" type="radio"
         id="tallyModeRadio" [checked]="isTallyMode()">
  <label class="form-check-label" for="tallyModeRadio">
    {{ 'dataset.verifierMode.tally' | translate }}
  </label>
</div>

<ng-template #changeModeModal let-modal>
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" id="changeModeModalTitle">{{ 'dataset.verifierMode.modal.title' | translate }}</h5>
    </div>
    <div class="modal-body">
      {{ 'dataset.verifierMode.modal.message' | translate }}
    </div>
    <div class="modal-footer">
      <button (click)="modal.dismiss()" class="btn btn-secondary" type="button">{{ 'dataset.verifierMode.modal.buttonKeep' | translate }}</button>
      <button (click)="modal.close()" class="btn btn-danger" type="button">{{ 'dataset.verifierMode.modal.buttonChange' | translate }}</button>
    </div>
  </div>
</ng-template>
