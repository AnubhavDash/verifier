<input #loadDataset (change)="load($event)" accept=".zip" onclick="this.value=null" style="display: none" type="file">
<div class="row mb-2">
  <div class="d-grid col-4">
    <button (click)="loadDataset.click()"
            [disabled]="isLoadDisabled()"
            [ngClass]="{'btn-primary': isNotLoaded(), 'btn-outline-primary': !isNotLoaded()}"
            class="btn btn-block text-center dataset-type">
      <i aria-hidden="true" class="bi-upload"></i> {{ 'dataset.datasetLoad.loadButton' | translate: { datasetType: translatedDatasetType } }}</button>
  </div>
  <div class="col-8 mt-2">
    @if (isNotLoaded()) {
      {{ 'dataset.datasetLoad.notLoadedYet' | translate }}
    }
    @if (isLoading()) {
      <div class="spinner-border spinner-border-sm text-primary">
        <span class="visually-hidden">In progress...</span>
      </div>
      {{ 'dataset.datasetLoad.loading' | translate }}
    }
    @if (errorOccurred()) {
      <i aria-hidden="true" class="bi-exclamation-circle text-danger"></i>
      {{ 'dataset.datasetLoad.error' | translate }}
    }
    @if (isLoaded()) {
      <i aria-hidden="true" class="bi-check-circle text-success"></i> {{filename}}
    }
  </div>
</div>
