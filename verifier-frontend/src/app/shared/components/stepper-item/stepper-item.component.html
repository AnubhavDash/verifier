<a
  [routerLink]="link"
  class="nav-link link-primary d-flex align-items-center text-muted"
  data-test="step">
    <span
      routerLinkActive #rla="routerLinkActive"
      [ngClass]="{
        'bi-circle-fill': rla.isActive && !isComplete,
        'bi-circle': !rla.isActive && !isComplete,
        'bi-check-circle-fill': rla.isActive && isComplete,
        'bi-check-circle': !rla.isActive && isComplete
       }"
      aria-hidden="true" class="bi me-2 text-primary"></span>
  <span data-test="label" class="flex-grow-1 flex-shrink-0">{{linkText}}</span>
</a>
